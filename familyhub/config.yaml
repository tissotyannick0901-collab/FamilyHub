name: "FamilyHub"
description: "Application de gestion familiale — agenda, taches, budget, courses, documents et plus."
version: "3.6.0"
slug: "familyhub"
url: "https://github.com/ton-compte/familyhub-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 3000
ingress_stream: false
panel_icon: mdi:home-heart
panel_title: FamilyHub
homeassistant_api: true
options:
  secret: ""
  log_level: "info"
  api_port: 3001
schema:
  secret: str
  log_level: list(debug|info|warning|error)
  api_port: int(1024,65535)
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: "API FamilyHub — accès depuis l'app web"
map:
  - data:rw
